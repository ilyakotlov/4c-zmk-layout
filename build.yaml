# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property.
---
include:
  - board: nice_nano//zmk
    shield: 4c_left nice_view
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
  - board: nice_nano//zmk
    shield: 4c_right nice_view
  - board: nice_nano//zmk
    shield: 4c_left oled_i2c_p0p2
    artifact-name: 4c_left_oled_i2c_p0p2
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
  - board: nice_nano//zmk
    shield: 4c_right oled_i2c_p0p2
    artifact-name: 4c_right_oled_i2c_p0p2
  - board: nice_nano//zmk
    shield: 4c_left oled_i2c_p0p2_swap
    artifact-name: 4c_left_oled_i2c_p0p2_swap
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
  - board: nice_nano//zmk
    shield: 4c_right oled_i2c_p0p2_swap
    artifact-name: 4c_right_oled_i2c_p0p2_swap
  - board: nice_nano//zmk
    shield: 4c_left oled_i2c_p0p2_3d
    artifact-name: 4c_left_oled_i2c_p0p2_3d
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
  - board: nice_nano//zmk
    shield: 4c_right oled_i2c_p0p2_3d
    artifact-name: 4c_right_oled_i2c_p0p2_3d
  - board: nice_nano//zmk
    shield: 4c_left oled_i2c_p0p2_swap_64
    artifact-name: 4c_left_oled_i2c_p0p2_swap_64
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
  - board: nice_nano//zmk
    shield: 4c_right oled_i2c_p0p2_swap_64
    artifact-name: 4c_right_oled_i2c_p0p2_swap_64
  - board: nice_nano//zmk
    shield: settings_reset
